name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm test

# Deployment is handled automatically by Vercel on push to main.
# See: https://vercel.com/docs/git/vercel-for-github
# The Vercel project is linked via `.vercel/repo.json` and auto-deploys
# on every push to the main branch.
